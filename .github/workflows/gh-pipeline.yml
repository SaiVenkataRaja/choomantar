name: DevSecOps Pipeline for Choomantar 

on:
  push:
    branches: 
      - main

jobs: 
  build_and_secure:
    runs-on: ubuntu-latest

    steps:
      - name: Download Code from Repository
        uses: actions/checkout@v4
    
      - name: Run Trivy FS Scan (Check for Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Build Unified Docker Image
        run: docker build -t svr77/choomantar:1.0 .

      - name: Run Trivy Image Scan (Check Base OS)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'svr77/choomantar:1.0'
          scan-type: 'image'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Secure Image to Registry
        run: docker push svr77/choomantar:1.0

      - name: Deploy to Azure Ubuntu VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_KEY }}
          script: |
            # 1. Install Docker if it isn't already installed on the VM
            if ! command -v docker &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi
            
            # 2. Stop and remove any existing container using this name
            echo "Cleaning up existing containers..."
            sudo docker stop choomantar || true
            sudo docker rm choomantar || true
            
            # 3. Target a completely fresh external port (8082) to avoid host conflicts
            echo "Clearing port 8082 if occupied..."
            sudo fuser -k -n tcp 8082 || true
            sleep 1
            
            # 4. Pull the fresh, verified image from Docker Hub
            sudo docker pull svr77/choomantar:1.0
            
            # 5. Run the new container live on host port 8082
            echo "Deploying new container..."
            sudo docker run -d --name choomantar --restart always -p 8082:3000 svr77/choomantar:1.0